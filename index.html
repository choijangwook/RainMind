<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RainMind</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🌧 RainMind</h1>
<p>Rain Focus Rain</p>

<div class="section">
<h2>Quick Mode</h2>
<button onclick="applyMode('sleep')">😴 Sleep</button>
<button onclick="applyMode('focus')">📚 Focus</button>
<button onclick="applyMode('relax')">🧘 Relax</button>
<button onclick="applyMode('anxiety')">😟 Anxiety</button>
</div>

<div class="section">
<h2>Emotion</h2>
<button onclick="applyEmotion('calm')">Calm</button>
<button onclick="applyEmotion('deep')">Deep</button>
<button onclick="applyEmotion('warm')">Warm</button>
<button onclick="applyEmotion('lowvar')">Stable</button>
</div>

<div class="section">
<h2>3D Space</h2>
<input type="range" min="-1" max="1" step="0.1" value="0" id="pan">
<button onclick="autoPan()">Auto Move</button>
</div>

<div class="section">
<h2>Timer</h2>
<button onclick="setTimer(30)">30m</button>
<button onclick="setTimer(60)">60m</button>
<button onclick="setTimer(90)">90m</button>
</div>

<button onclick="save()">💾 Save</button>
<button onclick="toggle()">▶ Start</button>

<canvas id="rainFX"></canvas>

<script src="script.js"></script>
</body>
</html>
