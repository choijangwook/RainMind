layout: null

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RainMind</title>

<meta name="description" content="Rain sounds for sleep, focus and relaxation">

<link rel="stylesheet" href="assets/style.css">

<style>
body {
  background:#fff;
  color:#111;
  font-family:sans-serif;
  max-width:600px;
  margin:auto;
  padding:16px;
}

h1 {
  text-align:center;
}

/* 버튼 기본 */
button {
  width:100%;
  padding:12px;
  margin:6px 0;
  background:#222;
  color:#fff;
  border:none;
  border-radius:8px;
  font-size:15px;
}

/* grid */
.grid {
  display:flex;
  gap:6px;
}

.grid button {
  flex:1;
  font-size:13px;
}

/* 슬라이더 */
.row {
  display:flex;
  align-items:center;
  gap:10px;
  margin:6px 0;
}

.row span {
  width:80px;
}

input[type=range] {
  flex:1;
}

/* 광고 */
.ad {
  margin:14px 0;
  padding:12px;
  background:#f5f5f5;
  text-align:center;
  border-radius:8px;
  font-size:13px;
}

/* top links */
.topbar {
  display:flex;
  justify-content:flex-end;
  gap:12px;
}

a {
  color:#000;
  text-decoration:none;
}

a:visited {
  color:#000;
}
</style>

</head>

<body>

<!-- 🔝 메뉴 -->
<div class="topbar">
<a href="/RainMind/about/">About</a>
<a href="/RainMind/privacy/">Privacy</a>
</div>

<h1>🌧 RainMind</h1>

<!-- 광고 1 -->
<div class="ad">Ad</div>

<!-- Start -->
<button id="mainBtn">▶ Start</button>

<!-- 광고 2 -->
<div class="ad">Ad</div>

<!-- 프리셋 -->
<div class="grid">
<button onclick="applyPreset('sleep')">😴 Sleep</button>
<button onclick="applyPreset('focus')">📚 Focus</button>
<button onclick="applyPreset('relax')">🧘 Relax</button>
<button onclick="applyPreset('anxiety')">😟 Anxiety</button>
</div>

<!-- 슬라이더 -->
<div class="row"><span>Rain</span><input type="range" data-sound="rain" min="0" max="1" step="0.01" value="0.5"></div>
<div class="row"><span>Cafe</span><input type="range" data-sound="cafe" min="0" max="1" step="0.01" value="0"></div>
<div class="row"><span>Wind</span><input type="range" data-sound="wind" min="0" max="1" step="0.01" value="0"></div>
<div class="row"><span>Thunder</span><input type="range" data-sound="thunder" min="0" max="1" step="0.01" value="0"></div>
<div class="row"><span>Drone</span><input type="range" data-sound="drone" min="0" max="1" step="0.01" value="0"></div>

<!-- 광고 3 -->
<div class="ad">Ad</div>

<!-- 타이머 -->
<div class="grid">
<button onclick="setTimer(30)">30m</button>
<button onclick="setTimer(60)">1h</button>
<button onclick="setTimer(120)">2h</button>
<button onclick="setTimer(240)">4h</button>
<button onclick="setTimer(480)">8h</button>
</div>

<script src="script.js"></script>

</body>
</html>
