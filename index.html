<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RainMind</title>

<link rel="stylesheet" href="assets/style.css">

<style>
body { padding:16px; max-width:600px; margin:auto; }
h1 { text-align:center; }
button { padding:12px 16px; margin:6px 0; width:100%; font-size:16px; }
.section { margin-top:20px; }
.row { display:flex; align-items:center; gap:10px; margin:8px 0; }
.row span { width:80px; }
input[type=range] { flex:1; }
.preset button { width:48%; }
.timer button { width:48%; }
.grid { display:flex; flex-wrap:wrap; gap:4%; }
</style>

</head>

<body>

<h1>🌧 RainMind</h1>

<div>👉 Press Start and relax</div>

<button id="mainBtn">▶ Start</button>

<!-- 🎯 프리셋 -->
<div class="section preset">
<h3>Mode</h3>
<div class="grid">
<button onclick="applyPreset('sleep')">😴 Sleep</button>
<button onclick="applyPreset('focus')">📚 Focus</button>
<button onclick="applyPreset('relax')">🧘 Relax</button>
<button onclick="applyPreset('anxiety')">😟 Anxiety</button>
</div>
</div>

<!-- 🎚 믹스 -->
<div class="section">
<h3>Mix</h3>

<div class="row"><span>Rain</span>
<input type="range" min="0" max="1" step="0.01" value="0.5" data-sound="rain"></div>

<div class="row"><span>Cafe</span>
<input type="range" min="0" max="1" step="0.01" value="0" data-sound="cafe"></div>

<div class="row"><span>Wind</span>
<input type="range" min="0" max="1" step="0.01" value="0" data-sound="wind"></div>

<div class="row"><span>Thunder</span>
<input type="range" min="0" max="1" step="0.01" value="0" data-sound="thunder"></div>

<div class="row"><span>Drone</span>
<input type="range" min="0" max="1" step="0.01" value="0" data-sound="drone"></div>

</div>

<!-- ⏱ 타이머 -->
<div class="section timer">
<h3>Timer</h3>
<div class="grid">
<button onclick="setTimer(30)">30m</button>
<button onclick="setTimer(60)">1h</button>
<button onclick="setTimer(120)">2h</button>
<button onclick="setTimer(480)">8h</button>
</div>
</div>

<footer style="margin-top:40px;">
<a href="/RainMind/about/">About</a> |
<a href="/RainMind/privacy/">Privacy</a>
</footer>

<script src="script.js"></script>

</body>
</html>
