<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RainMind - Rain Sounds for Sleep & Focus</title>

<meta name="description" content="Rain sounds for deep sleep, focus, and relaxation. Customize your rain environment with RainMind.">

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>🌧 RainMind</h1>

<!-- TOP AD -->
<div class="ad">Ad</div>

<div class="section">
<h2>Mode</h2>
<div class="btn-group">
<button onclick="applyMode(this,'sleep')">😴 Sleep</button>
<button onclick="applyMode(this,'focus')">📚 Focus</button>
<button onclick="applyMode(this,'relax')">🧘 Relax</button>
<button onclick="applyMode(this,'anxiety')">😟 Anxiety</button>
</div>
</div>

<!-- MID AD -->
<div class="ad">Ad</div>

<div class="section">
<h2>Mix</h2>

<div class="row"><span>Rain</span><input type="range" min="0" max="1" step="0.01" oninput="setVolume('rain', this.value)"></div>
<div class="row"><span>Cafe</span><input type="range" min="0" max="1" step="0.01" oninput="setVolume('cafe', this.value)"></div>
<div class="row"><span>Wind</span><input type="range" min="0" max="1" step="0.01" oninput="setVolume('wind', this.value)"></div>
<div class="row"><span>Thunder</span><input type="range" min="0" max="1" step="0.01" oninput="setVolume('thunder', this.value)"></div>
<div class="row"><span>Drone</span><input type="range" min="0" max="1" step="0.01" oninput="setVolume('drone', this.value)"></div>

</div>

<div class="section">
<h2>Timer</h2>
<button onclick="setTimer(30)">30m</button>
<button onclick="setTimer(60)">1h</button>
<button onclick="setTimer(120)">2h</button>
<button onclick="setTimer(240)">4h</button>
<button onclick="setTimer(480)">8h</button>
</div>

<div class="section">
<button onclick="savePreset()">💾 Save</button>
<button onclick="loadPreset()">📂 Load</button>
</div>

<div class="info">
🌧 Deep rain sound helps reduce stress and improve focus.  
Try Rain + Cafe for productivity.
</div>

<!-- BOTTOM AD -->
<div class="ad">Ad</div>

<button id="mainBtn" onclick="toggle()">▶ Start</button>

<script src="script.js"></script>
</body>
</html>
