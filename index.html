<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RainMind</title>

<link rel="stylesheet" href="assets/style.css">

<style>
body {
  background:#fff;
  color:#111;
  padding:16px;
  max-width:600px;
  margin:auto;
  font-family:sans-serif;
}

button {
  width:100%;
  padding:12px;
  margin:6px 0;
  background:#222;
  color:#fff;
  border:none;
  border-radius:8px;
  font-size:15px;
}

button.active {
  background:#007bff;
}

.grid {
  display:flex;
  gap:6px;
}

.grid button {
  flex:1;
  font-size:13px;
}

.row {
  display:flex;
  align-items:center;
  gap:10px;
}

.row span {
  width:80px;
}

.ad {
  margin:15px 0;
  text-align:center;
}
</style>

</head>

<body>

<h1>🌧 RainMind</h1>

<button id="mainBtn">▶ Start</button>

<!-- 🎯 프리셋 -->
<div class="grid">
<button class="preset-btn" onclick="presetClick(this,'sleep')">😴 sleep</button>
<button class="preset-btn" onclick="presetClick(this,'focus')">📚 focus</button>
<button class="preset-btn" onclick="presetClick(this,'relax')">🧘 relax</button>
<button class="preset-btn" onclick="presetClick(this,'anxiety')">😟 anxiety</button>
</div>

<!-- 🎚 믹스 -->
<div class="row"><span>Rain</span><input type="range" min="0" max="1" step="0.01" value="0.5" data-sound="rain"></div>
<div class="row"><span>Cafe</span><input type="range" min="0" max="1" step="0.01" value="0" data-sound="cafe"></div>
<div class="row"><span>Wind</span><input type="range" min="0" max="1" step="0.01" value="0" data-sound="wind"></div>
<div class="row"><span>Thunder</span><input type="range" min="0" max="1" step="0.01" value="0" data-sound="thunder"></div>
<div class="row"><span>Drone</span><input type="range" min="0" max="1" step="0.01" value="0" data-sound="drone"></div>

<!-- ⏱ 타이머 -->
<div class="grid">
<button class="timer-btn" onclick="timerClick(this,30)">30m</button>
<button class="timer-btn" onclick="timerClick(this,60)">1h</button>
<button class="timer-btn" onclick="timerClick(this,120)">2h</button>
<button class="timer-btn" onclick="timerClick(this,240)">4h</button>
<button class="timer-btn" onclick="timerClick(this,480)">8h</button>
</div>

<script src="script.js"></script>

</body>
</html>
