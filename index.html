---
layout: null
---

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RainMind - Rain Sounds</title>

<meta name="description" content="Rain sounds for sleep, focus, relaxation and anxiety relief.">

<link rel="stylesheet" href="assets/style.css">

<style>
body {
  background:#fff;
  color:#111;
  padding:16px;
  max-width:600px;
  margin:auto;
  font-family:sans-serif;
}

button {
  width:100%;
  padding:12px;
  margin:5px 0;
  background:#111;
  color:#fff;
  border:none;
  border-radius:8px;
  font-size:15px;
  transition:0.2s;
}

/* 🔥 눌림 유지 효과 */
button.active {
  background:#333;
}

.grid {
  display:flex;
  gap:5px;
}

.grid button {
  flex:1;
  font-size:12px;
}

.topbar {
  display:flex;
  justify-content:flex-end;
  gap:15px;
}

.row {
  display:flex;
  align-items:center;
  gap:10px;
}

.row span {
  width:80px;
}

.ad {
  margin:15px 0;
  text-align:center;
}
</style>

</head>

<body>

<div class="topbar">
<a href="/RainMind/about/">About</a>
<a href="/RainMind/privacy/">Privacy</a>
</div>

<h1>🌧 RainMind</h1>

<!-- 📘 guide.md 정상 출력 -->
{% capture guide %}{% include_relative pages/guide.md %}{% endcapture %}
{{ guide | markdownify }}

<div class="ad">Ad</div>

<button id="mainBtn">▶ Start</button>

<!-- 💾 -->
<div class="grid">
<button onclick="saveMix()">💾 Save</button>
<button onclick="loadMix()">📂 Load</button>
</div>

<!-- 🎯 프리셋 -->
<div class="grid">
<button onclick="presetClick(this,'sleep')">😴 sleep</button>
<button onclick="presetClick(this,'focus')">📚 focus</button>
<button onclick="presetClick(this,'relax')">🧘 relax</button>
<button onclick="presetClick(this,'anxiety')">😟 anxiety</button>
</div>

<div class="ad">Ad</div>

<!-- 🎚 믹스 -->
<div class="row"><span>Rain</span><input type="range" min="0" max="1" step="0.01" value="0.5" data-sound="rain"></div>
<div class="row"><span>Cafe</span><input type="range" min="0" max="1" step="0.01" value="0" data-sound="cafe"></div>
<div class="row"><span>Wind</span><input type="range" min="0" max="1" step="0.01" value="0" data-sound="wind"></div>
<div class="row"><span>Thunder</span><input type="range" min="0" max="1" step="0.01" value="0" data-sound="thunder"></div>
<div class="row"><span>Drone</span><input type="range" min="0" max="1" step="0.01" value="0" data-sound="drone"></div>

<div class="ad">Ad</div>

<!-- ⏱ -->
<div class="grid">
<button onclick="setTimer(30)">30m</button>
<button onclick="setTimer(60)">1h</button>
<button onclick="setTimer(120)">2h</button>
<button onclick="setTimer(240)">4h</button>
<button onclick="setTimer(480)">8h</button>
</div>

<script src="script.js"></script>

</body>
</html>
