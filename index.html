<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RainMind</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🌧 RainMind</h1>

<div class="section">
<h2>Mode</h2>
<div class="btn-group">
<button onclick="applyMode(this,'sleep')">😴 Sleep</button>
<button onclick="applyMode(this,'focus')">📚 Focus</button>
<button onclick="applyMode(this,'relax')">🧘 Relax</button>
<button onclick="applyMode(this,'anxiety')">😟 Anxiety</button>
</div>
</div>

<div class="section">
<h2>Mix</h2>

<div class="row"><span>Rain</span><input type="range" min="0" max="1" step="0.01" onchange="setVolume('rain', this.value)"></div>
<div class="row"><span>Cafe</span><input type="range" min="0" max="1" step="0.01" onchange="setVolume('cafe', this.value)"></div>
<div class="row"><span>Wind</span><input type="range" min="0" max="1" step="0.01" onchange="setVolume('wind', this.value)"></div>
<div class="row"><span>Thunder</span><input type="range" min="0" max="1" step="0.01" onchange="setVolume('thunder', this.value)"></div>
<div class="row"><span>Drone</span><input type="range" min="0" max="1" step="0.01" onchange="setVolume('drone', this.value)"></div>

</div>

<div class="section">
<h2>Timer</h2>
<button onclick="setTimer(30)">30m</button>
<button onclick="setTimer(60)">1h</button>
<button onclick="setTimer(120)">2h</button>
<button onclick="setTimer(240)">4h</button>
<button onclick="setTimer(480)">8h</button>
</div>

<button id="mainBtn" onclick="toggle()">▶ Start</button>

<script src="script.js"></script>
</body>
</html>
