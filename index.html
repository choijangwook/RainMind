<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RainMind - Rain Sounds</title>

<meta name="description" content="Relax with rain sounds for sleep, focus, and relaxation.">

<link rel="stylesheet" href="{{ site.baseurl }}/assets/style.css">

</head>

<body>

<h1>🌧 RainMind</h1>

<div class="hero">
<h2>Rain Sounds for Sleep, Focus & Relaxation</h2>
<p>Customize your perfect rain environment</p>
</div>

<div class="cta">
👉 Press Start and relax
</div>

<button id="mainBtn" onclick="toggle()">▶ Start</button>

<div class="section">
<h2>Mix</h2>

<div class="row">
<span>Rain</span>
<input type="range" min="0" max="1" step="0.01" value="0.5" oninput="setVolume('rain', this.value)">
</div>

<div class="row">
<span>Cafe</span>
<input type="range" min="0" max="1" step="0.01" value="0" oninput="setVolume('cafe', this.value)">
</div>

<div class="row">
<span>Wind</span>
<input type="range" min="0" max="1" step="0.01" value="0" oninput="setVolume('wind', this.value)">
</div>

<div class="row">
<span>Thunder</span>
<input type="range" min="0" max="1" step="0.01" value="0" oninput="setVolume('thunder', this.value)">
</div>

<div class="row">
<span>Drone</span>
<input type="range" min="0" max="1" step="0.01" value="0" oninput="setVolume('drone', this.value)">
</div>

</div>

<footer style="margin-top:40px;">
<a href="{{ site.baseurl }}/about/">About</a> |
<a href="{{ site.baseurl }}/privacy/">Privacy</a>
</footer>

<script src="{{ site.baseurl }}/script.js"></script>

</body>
</html>
