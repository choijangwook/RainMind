<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RainMind</title>

<link rel="stylesheet" href="assets/style.css">

<style>
body { padding:16px; max-width:600px; margin:auto; font-family:sans-serif; }

h1 { text-align:center; margin-bottom:10px; }

.topbar {
  display:flex;
  justify-content:flex-end;
  gap:15px;
  margin-bottom:10px;
}

.topbar a { text-decoration:none; font-size:14px; color:#333; }

button {
  padding:12px;
  width:100%;
  margin:5px 0;
  font-size:16px;
  background:#222;
  color:#fff;
  border:none;
  border-radius:8px;
}

button:active {
  background:#444;
}

.grid-1line {
  display:flex;
  gap:6px;
}

.grid-1line button {
  flex:1;
  font-size:13px;
  padding:10px 4px;
}

.section { margin-top:20px; }

.row {
  display:flex;
  align-items:center;
  gap:10px;
}

.row span { width:80px; }

input[type=range] { flex:1; }

.ad {
  margin:15px 0;
  text-align:center;
}
</style>

</head>

<body>

<!-- 🔝 상단 메뉴 -->
<div class="topbar">
<a href="/RainMind/about/">About</a>
<a href="/RainMind/privacy/">Privacy</a>
</div>

<h1>🌧 RainMind</h1>

<!-- 📘 사용 설명 (.md 연결) -->
<div id="guide">
{% capture guide %}{% include_relative pages/guide.md %}{% endcapture %}
{{ guide | markdownify }}
</div>

<!-- 🔥 광고 위치 1 -->
<div class="ad">
<!-- 애드센스 코드 넣는 자리 -->
Ad
</div>

<div>👉 Press Start and relax</div>

<button id="mainBtn">▶ Start</button>

<!-- 🎯 프리셋 -->
<div class="section">
<h3>Mode</h3>
<div class="grid-1line">
<button onclick="applyPreset('sleep')">😴</button>
<button onclick="applyPreset('focus')">📚</button>
<button onclick="applyPreset('relax')">🧘</button>
<button onclick="applyPreset('anxiety')">😟</button>
</div>
</div>

<!-- 🎚 믹스 -->
<div class="section">
<h3>Mix</h3>

<div class="row"><span>Rain</span>
<input type="range" min="0" max="1" step="0.01" value="0.5" data-sound="rain"></div>

<div class="row"><span>Cafe</span>
<input type="range" min="0" max="1" step="0.01" value="0" data-sound="cafe"></div>

<div class="row"><span>Wind</span>
<input type="range" min="0" max="1" step="0.01" value="0" data-sound="wind"></div>

<div class="row"><span>Thunder</span>
<input type="range" min="0" max="1" step="0.01" value="0" data-sound="thunder"></div>

<div class="row"><span>Drone</span>
<input type="range" min="0" max="1" step="0.01" value="0" data-sound="drone"></div>

</div>

<!-- 🔥 광고 위치 2 -->
<div class="ad">Ad</div>

<!-- ⏱ 타이머 -->
<div class="section">
<h3>Timer</h3>
<div class="grid-1line">
<button onclick="setTimer(30)">30m</button>
<button onclick="setTimer(60)">1h</button>
<button onclick="setTimer(120)">2h</button>
<button onclick="setTimer(240)">4h</button>
<button onclick="setTimer(480)">8h</button>
</div>
</div>

<!-- 🔥 광고 위치 3 -->
<div class="ad">Ad</div>

<script src="script.js"></script>

</body>
</html>
