<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RainMind - Rain Focus Rain</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🌧 RainMind</h1>
<p class="subtitle">Rain Focus Rain</p>

<div class="section">
  <h2>Mode</h2>
  <button onclick="setMode('sleep')">Sleep</button>
  <button onclick="setMode('focus')">Focus</button>
  <button onclick="setMode('relax')">Relax</button>
  <button onclick="setMode('anxiety')">Anxiety</button>
</div>

<div class="section">
  <h2>Emotion</h2>
  <button onclick="setEmotion('calm')">Calm</button>
  <button onclick="setEmotion('deep')">Deep</button>
  <button onclick="setEmotion('warm')">Warm</button>
</div>

<div class="section">
  <h2>3D Space</h2>
  <input type="range" min="-1" max="1" step="0.1" value="0" oninput="setPan(this.value)">
</div>

<div class="section">
  <h2>Mix</h2>
  <label><input type="checkbox" onchange="toggleLayer('cafe')"> Cafe</label>
  <label><input type="checkbox" onchange="toggleLayer('wind')"> Wind</label>
  <label><input type="checkbox" onchange="toggleLayer('thunder')"> Thunder</label>
</div>

<button class="main-btn" onclick="toggleSound()">▶ Start</button>

</body>
<script src="script.js"></script>
</html>
