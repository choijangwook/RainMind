 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RainMind</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🌧 RainMind</h1>
<p>Rain Focus Rain</p>

<div class="section">
<h2>Mode</h2>
<button onclick="applyMode('sleep')">😴 Sleep</button>
<button onclick="applyMode('focus')">📚 Focus</button>
<button onclick="applyMode('relax')">🧘 Relax</button>
<button onclick="applyMode('anxiety')">😟 Anxiety</button>
</div>

<div class="section">
<h2>Mix</h2>

<label>Rain <input type="range" min="0" max="1" step="0.01" onchange="setVolume('rain', this.value)"></label><br>
<label>Cafe <input type="range" min="0" max="1" step="0.01" onchange="setVolume('cafe', this.value)"></label><br>
<label>Wind <input type="range" min="0" max="1" step="0.01" onchange="setVolume('wind', this.value)"></label><br>
<label>Thunder <input type="range" min="0" max="1" step="0.01" onchange="setVolume('thunder', this.value)"></label><br>
<label>Drone <input type="range" min="0" max="1" step="0.01" onchange="setVolume('drone', this.value)"></label>

</div>

<div class="section">
<h2>3D Space</h2>
<input type="range" min="-1" max="1" step="0.1" id="pan">
</div>

<div class="section">
<button onclick="save()">💾 Save</button>
</div>

<button onclick="toggle()">▶ Start</button>

<script src="script.js"></script>
</body>
</html>
