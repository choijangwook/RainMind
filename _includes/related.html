<div class="related">

<h3>🔥 Popular</h3>
<ul id="popularList"></ul>

</div>

<script>
let posts = [
{% for post in site.posts %}
{url:"{{ site.baseurl }}{{ post.url }}", title:"{{ post.title }}"},
{% endfor %}
];

posts.sort((a,b)=>{
let av = localStorage.getItem("views_"+a.url) || 0;
let bv = localStorage.getItem("views_"+b.url) || 0;
return bv - av;
});

let html="";
posts.slice(0,5).forEach(p=>{
html += `<li><a href="${p.url}">${p.title}</a></li>`;
});

document.getElementById("popularList").innerHTML = html;
</script>
